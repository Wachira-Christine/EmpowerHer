# Spring Boot Application Configuration
server.port=8080

# Spring Boot Mail Sender (SMTP Configuration)
# Configure these with your active mail credentials (e.g. Gmail App Password, Mailtrap, etc.)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=empowerher.reminders@gmail.com
spring.mail.password=your_smtp_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Firebase Firestore Configuration
# If local, you can place your 'service-account.json' key in backend/src/main/resources/
# and it will automatically be loaded on bootstrap.
firebase.database.url=https://empowerher-placeholder.firebaseio.com
